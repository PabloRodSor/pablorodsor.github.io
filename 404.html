<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="robots" content="noindex, follow"> <!-- 404 should not be indexed -->
    <title>Página no encontrada | Weather Dashboard Pro</title>

    <!-- Color de Tema y Favicon para PWA/Mobile -->
    <meta name="theme-color" content="#1a2a6c">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌤️</text></svg>">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌤️</text></svg>">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
    <style>
        .error-card {
            text-align: center;
            padding: 40px;
        }
        .error-code {
            font-size: 6rem;
            font-weight: 700;
            color: var(--accent-color);
            margin-bottom: 10px;
            line-height: 1;
        }
        .error-card p {
            font-size: 1.2rem;
            margin-bottom: 20px;
            opacity: 0.9;
        }
        .home-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: var(--accent-color);
            color: white;
            padding: 12px 24px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: 600;
            transition: transform 0.2s ease, background 0.2s ease;
        }
        .home-btn:hover {
            transform: translateY(-3px);
            background: #ff4747;
            color: white;
        }
        /* Auto redirect logic */
        #redirect-msg {
            font-size: 0.9rem;
            margin-top: 15px;
            opacity: 0.7;
        }
    </style>
</head>

<body>
    <div class="background-gradient"></div>

    <div class="earth-container">
        <div class="earth">
            <div class="earth-lines">
                <div class="earth-line"></div>
                <div class="earth-line"></div>
                <div class="earth-line"></div>
                <div class="earth-line"></div>
            </div>
        </div>
    </div>

    <main class="container" style="max-width: 500px; margin-top: auto; margin-bottom: auto; height: 100vh; display: flex; align-items: center;">
        <h1 class="sr-only">Error 404 - Página no encontrada</h1>
        <section class="app-section">
            <div class="glass-card error-card">
                <div class="error-code">404</div>
                <h2>¿Perdido en las nubes?</h2>
                <p>La página que estás buscando no existe o fue movida.</p>
                <a href="index.html" class="home-btn" aria-label="Volver a la página de inicio">
                    <i class="fa-solid fa-house" aria-hidden="true"></i> Volver al Inicio
                </a>
                <p id="redirect-msg">Serás redirigido automáticamente en <span id="countdown">10</span> segundos.</p>
            </div>
        </section>
    </main>

    <script>
        let counter = 10;
        const countdownEl = document.getElementById('countdown');
        const redirectTimer = setInterval(() => {
            counter--;
            countdownEl.textContent = counter;
            if (counter <= 0) {
                clearInterval(redirectTimer);
                window.location.href = 'index.html';
            }
        }, 1000);
    </script>
</body>
</html>
