    <meta name="author" content="Weather Dashboard Pro Team">
    <meta name="robots" content="index, follow">

    <title>Contacto | Weather Dashboard Pro</title>

    <!-- Google Analytics Placeholder -->

    <link rel="stylesheet" href="style.css">
    <style>
        .contact-form {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 20px;
        }

        .contact-form input,
        .contact-form textarea {
            padding: 10px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.4);
            background: rgba(255, 255, 255, 0.2);
            font-family: var(--primary-font);
            color: var(--text-color);
        }

        .contact-form input::placeholder,
        .contact-form textarea::placeholder {
            color: rgba(51, 51, 51, 0.7);
        }

        .contact-form button {
            background: var(--accent-color);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: transform 0.2s ease;
        }

        .contact-form button:hover {
            transform: scale(1.02);
        }
    </style>
</head>

<body>
    <div class="background-gradient"></div>

    <div class="earth-container">
        <div class="earth">
            <div class="earth-lines">
                <div class="earth-line"></div>
                <div class="earth-line"></div>
                <div class="earth-line"></div>
                <div class="earth-line"></div>
            </div>
        </div>
    </div>

    <header class="glass-header">
        <div class="logo">
            <i class="fa-solid fa-cloud-sun-rain" aria-hidden="true"></i> WeatherApp
        </div>
        <button id="menu-btn" class="menu-btn" aria-label="Abrir menú de navegación">
            <i class="fa-solid fa-bars" aria-hidden="true"></i>
        </button>
    </header>

    <nav aria-label="Navegación principal">
        <aside id="sidebar" class="sidebar">
            <div class="sidebar-header">
                <h3>Menú</h3>
                <button id="close-sidebar" aria-label="Cerrar menú"><i class="fa-solid fa-xmark"
                        aria-hidden="true"></i></button>
            </div>
            <ul class="sidebar-links">
                <li><a href="index.html" class="nav-link-external" title="Inicio"><i class="fa-solid fa-house"
                            aria-hidden="true"></i> Inicio</a></li>
                <li><a href="about.html" class="nav-link-external" title="Acerca de nosotros"><i
                            class="fa-solid fa-circle-info" aria-hidden="true"></i> Acerca de</a></li>
                <li><a href="contact.html" class="nav-link active" title="Contacto"><i class="fa-solid fa-envelope"
                            aria-hidden="true"></i> Contacto</a></li>
            </ul>
        </aside>
    </nav>
    <div id="overlay" class="overlay hidden"></div>

    <main class="container">
        <section id="contact-section" class="app-section">
            <div class="glass-card">
                <h2><i class="fa-solid fa-envelope" aria-hidden="true"></i> Contacto</h2>
                <p>Déjanos tu mensaje y te responderemos a la brevedad.</p>
                <form class="contact-form" onsubmit="event.preventDefault(); alert('Mensaje enviado (simulación)');">
                    <label for="name" class="hidden">Nombre completo</label>
                    <input type="text" id="name" placeholder="Tu Nombre" required aria-label="Ingresa tu nombre">

                    <label for="email" class="hidden">Correo electrónico</label>
                    <input type="email" id="email" placeholder="Tu Correo" required aria-label="Ingresa tu correo">

                    <label for="message" class="hidden">Mensaje</label>
                    <textarea id="message" rows="4" placeholder="Tu Mensaje" required
                        aria-label="Ingresa tu mensaje"></textarea>

                    <button type="submit">Enviar Mensaje</button>
                </form>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
